id = "ORCH-AUTOCALLS-LEDGER-1"
title = "Auto-calls ledger + periodic judgment review"
tag = "stack"
domain = "agentic"
layer = "universal"
enforcement = "structured"
default = true
stance = "default"
summary = "Every self-made clear-winner call is logged with date, rule, decision, alternatives, and why. The agent surfaces the accumulated batch for human accept/modify/reject on a weekly cadence. Further autonomous runs hold until the batch is cleared, so drift cannot compound past the weekly review window."
why = "Per-decision gates miss aggregate drift; many small calls can drift heavy or split into competing patterns over hundreds of choices. This is the altitude check."
alternatives = [
    "every self-made clear-winner call is logged with date, rule, decision, alternatives, and why; the agent surfaces the accumulated batch for human accept/modify/reject daily; further autonomous runs hold until the batch is cleared (more granular review, more interruptions to forward progress)",
    "every self-made clear-winner call is logged with date, rule, decision, alternatives, and why; the agent surfaces the accumulated batch for human accept/modify/reject monthly; further autonomous runs hold until the batch is cleared (longer windows of accumulated drift between reviews; reviews are heavier when they happen)",
    "every self-made clear-winner call is logged with date, rule, decision, alternatives, and why; the agent surfaces the accumulated batch for human accept/modify/reject weekly; autonomous runs continue freely between reviews rather than holding (faster forward progress; accepts that drift can compound past a missed review window before the next sweep catches it)",
]
