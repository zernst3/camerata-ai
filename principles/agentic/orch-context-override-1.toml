id = "ORCH-CONTEXT-OVERRIDE-1"
title = "Rule overrides driven by project context require explicit human sign-off"
tag = "stack"
domain = "agentic"
layer = "universal"
enforcement = "prose"
default = true
stance = "default"
summary = "When the agent identifies that applying a documented rule would produce wrong-shaped output for the project, the agent pauses and escalates the override to a human reviewer before either updating the rule or producing any artifact that diverges from it. Wrong-shaped output here means context-fit failures such as: the rule's stance conflicts with the project's positioning, a downstream constraint defeats the rule's rationale, an ecosystem convention diverges from the rule's stance, or similar misalignments between the rule's assumptions and the project's actual context. The escalation cites the rule by identifier and proposes the override. The agent resumes only after explicit sign-off. Silent override of a documented rule is forbidden."
why = "Documented rules exist because an architect made an explicit commit; overriding one without review treats the original commit as casual. The override may still be right (projects evolve, ecosystems shift, downstream constraints can defeat a rule's original rationale), but the rule revision plus the deviating artifact together represent a non-trivial architectural shift that warrants the same review the original commit received. Pausing is the price of preserving rule authority while still allowing rules to evolve."
alternatives = [
    "When the agent identifies that applying a documented rule would produce wrong-shaped output for the project (context-fit failures such as the rule's stance conflicting with the project's positioning, a downstream constraint defeating the rule's rationale, an ecosystem convention diverging from the rule's stance, or similar misalignments), the agent applies the override autonomously, updates the rule's text in the same change, and records the override for asynchronous review by a human later. (trades pause cost for review-cadence cost; defensible when the project's review process is slower than the agent's iteration cadence)",
    "Documented rules are absolute; the agent never overrides them based on local context, and a poor-fit rule is filed to the decisions log without the agent producing any artifact (trades agent autonomy for rule stability; defensible in regulated or safety-critical contexts where the cost of unreviewed deviation exceeds the cost of slower iteration)",
]
