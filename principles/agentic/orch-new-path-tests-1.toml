id = "ORCH-NEW-PATH-TESTS-1"
title = "AI-authored code paths carry tests, not just a passing existing suite"
tag = "stack"
domain = "agentic"
layer = "universal"
enforcement = "mechanical"
default = true
stance = "default"
summary = "A change that adds a new code path carries new tests for that path, not only a green run of the existing test suite. The new test exercises the new branch directly, and a change-time check verifies that the new path is actually reached by the new test (a coverage diff on the introduced lines, a mutation check on the new branch, or equivalent). The rule applies to every change but is load-bearing for AI-authored ones, because agents can write code that compiles and that the existing suite passes while leaving the new branch entirely uncovered."
why = "Green existing tests prove the new code did not break old paths; they do not prove the new path works. The unstated assumption that 'tests pass' implies 'tests cover' breaks down on every diff that adds code outside the existing test surface. For human-authored changes the failure mode is a slow drift; for AI-authored changes it is an immediate, every-diff failure mode because the agent has no instinct to test what it just wrote unless the pipeline forces the test to exist and to actually exercise the new path."
alternatives = [
    "require only that the existing suite passes (the common default, misses every new branch the existing suite cannot reach)",
    "require a coverage percentage on the full project (statistical comfort that masks targeted gaps in specific new paths)",
    "rely on post-merge canary or staging environments to catch coverage gaps (real catches but late, expensive once human reviewer attention has moved on)",
]
