id = "ORCH-OUTPUT-DIGEST-1"
title = "Output discipline — local-mostly + a single consolidated digest"
tag = "choice"
domain = "agentic"
layer = "universal"
enforcement = "prose"
default = true
stance = "default"
summary = "Autonomous routines produce local artifacts (commits, state files) and write to a shared inbox; a single daily consolidator ranks all routines' output by priority and sends one digest, rather than each routine pinging directly. Critical items can break through immediately."
why = "Signal-to-noise: one clean ranked digest is read; N direct pings get muted. A fail-safe (alert if the consolidator hasn't run in over N hours) catches silent failure of the digest itself."
alternatives = [
    "per-routine direct notifications (noisier)",
    "batch everything with no prioritization (loses urgency)",
]

[choice]
prompt = "How should routines report their output?"
options = [
    "local artifacts + a single consolidated daily digest",
    "per-routine direct notifications",
    "batch everything",
]
default = "local artifacts + a single consolidated daily digest"
