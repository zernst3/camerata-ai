id = "ORCH-PRECISION-RECALL-1"
title = "Autonomous detection defaults to recall, precision-tuning is a per-signal opt-in"
tag = "choice"
domain = "agentic"
layer = "universal"
enforcement = "prose"
default = true
stance = "default"
summary = "Detection signals in autonomous routines (tech-debt sniffers, anomaly flags, drift detectors, anything that gates the routine on a judgment call) are tuned broadly. Anything that could plausibly be a real issue triggers a pause, including borderline cases that turn out to be false positives. The cost of stopping to investigate a false positive is small and recoverable. The cost of letting a real issue slip through silently is unbounded. Default posture: catch too much, not too little."
why = "False positives are recoverable. The routine pauses, a human takes a minute to investigate, the false positive gets dismissed, the routine resumes. Annoying but cheap. False negatives are silent: the issue slips through, compounds across subsequent runs, and the team never learns it was missed. Cheap upfront, expensive forever. Defaulting to recall keeps the cost of being wrong in the recoverable lane. Defaulting to precision puts it in the silent lane."
alternatives = [
    "default to precision: tune detection for strong-tier signals only, accept missed issues to avoid false-positive halts (defensible when the routine has very high opportunity cost from pauses, risky when missed issues compound silently)",
    "no tuning, accept whatever recall and precision the detection naturally produces (works at small scale, becomes unworkable as routine volume grows and detection signals proliferate)",
]

[choice]
prompt = "How should autonomous detection signals balance false positives against false negatives?"
options = [
    "default to recall, opt specific signals into precision-tuning",
    "default to precision, opt specific signals into broader recall",
    "no tuning, accept default signal sensitivity",
]
default = "default to recall, opt specific signals into precision-tuning"
