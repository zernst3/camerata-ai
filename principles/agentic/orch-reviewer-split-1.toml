id = "ORCH-REVIEWER-SPLIT-1"
title = "The reviewer agent for any change is distinct from the author agent"
tag = "stack"
domain = "agentic"
layer = "universal"
enforcement = "structured"
default = true
stance = "default"
summary = "The agent that reviews a change is a separate agent from the one that authored it. Author and reviewer differ in some load-bearing configuration: a different prompt, a different principles set, a different model, or a combination of those. The reviewer reads the diff, the change's stated intent, and the codified architectural commitments. The reviewer does not read the author agent's reasoning trace. This separation holds across all orchestrated work regardless of whether author and reviewer share a model family."
why = "An agent that reviews its own output inherits its own blindspots: the architectural drift the author missed at write time is the same drift the same agent will miss at review time. A separate reviewer breaks that loop by bringing a different prompt or model context to the diff. Reading the diff against the commitments rather than against the author's reasoning forces the reviewer to evaluate the change as written, not as the author intended it to read, which is the only way the review catches the cases where intent and implementation drifted apart."
alternatives = [
    "same agent reviews its own output (the failure mode this rule exists to prevent, since the author's blindspots transfer directly to the review)",
    "different instance of the same model and the same prompt reviews (catches some blindspots but shares model-level priors, so subtle drift survives both passes)",
    "reviewer agent reads the author's reasoning trace alongside the diff (lets the author's framing color the reviewer's evaluation and weakens the independence the rule exists to preserve)",
]
