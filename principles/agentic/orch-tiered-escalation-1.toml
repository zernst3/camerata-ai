id = "ORCH-TIERED-ESCALATION-1"
title = "Tiered escalation — soft-flag by default, hard-pause only for guard areas"
tag = "choice"
domain = "agentic"
layer = "universal"
enforcement = "prose"
default = true
stance = "default"
summary = "Most flagged items get soft-flagged (logged, routine continues on other work). Hard-pause (halt until a human clears it) only for genuinely blocking categories: sensitive 'hard-guard' areas (auth, payments, infra, CI) or when the review queue overflows a threshold."
why = "Routine work should flow; reserve the halt for decisions that truly block forward progress or that accumulate into a backlog."
alternatives = [
    "hard-pause on everything (constant halts)",
    "never pause (dangerous drift)",
]

[choice]
prompt = "How should flagged items gate the routine?"
options = [
    "soft-flag by default, hard-pause only for guard areas",
    "hard-pause on everything",
    "never pause",
]
default = "soft-flag by default, hard-pause only for guard areas"
