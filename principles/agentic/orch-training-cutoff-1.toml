id = "ORCH-TRAINING-CUTOFF-1"
title = "Training-data-limited decisions route to human review by category, not by confidence"
tag = "stack"
domain = "agentic"
layer = "universal"
enforcement = "prose"
default = true
stance = "default"
summary = "When a decision depends on the current state of something the agent cannot directly observe from inside the project (third-party dependency versions, framework or vendor API shapes, latest model identifiers, current security-advisory state, anything whose ground truth ships outside the project's own source tree and moves faster than the agent's training cutoff), the agent does not decide unilaterally. It surfaces the question to a human reviewer along with the candidate answer and the citation it would use. The trigger is the CATEGORY of question, not the agent's subjective confidence: confidence calibrated against a stale training snapshot is the failure mode the rule exists to prevent. The category is visible, shipped version surfaces with an external ground truth. The rule does NOT cover stable, self-correcting surfaces like the host language's edition or backwards-compatible compiler features, where the project's own declared version anchors the answer."
why = "An agent that decides on training-cutoff-sensitive surfaces with high confidence is calibrating against a stale snapshot, not the current world. The cost of being wrong is usually silent: code that compiles against a version the agent assumed exists, an API call to an endpoint whose shape has since changed, a model identifier that no longer routes anywhere. The sharper form of the rule is that the trigger is category, not confidence. The agent cannot self-assess whether its knowledge of an external surface is current; the project's source tree cannot tell either; the only authority is a human with access to the current docs or registry. Self-stabilizing surfaces (the compiler edition or stable language features the project anchors via its declared edition or version) stay out of scope because the project itself carries the ground truth, so a stale snapshot is corrected by reading the project."
alternatives = [
    "auto-decide on dependency or API questions whenever the agent's confidence feels high (the failure mode the rule exists to prevent; confidence calibrated against a stale snapshot is wrong in exactly the cases that matter, and the wrong calls are usually silent at code-author time)",
    "route every version-sensitive question to a human, including stable self-correcting ones like compiler-edition questions (over-pauses; the project's declared edition or version anchors those answers, so they do not need external verification)",
    "have the agent fetch the current state through whatever web or registry tool it has and then auto-decide from the fetched answer (closer to correct than acting on training memory alone, but still trusts the agent's interpretation of the fetched content and depends on the agent having a fetch capability; falls back to category-routing when no fetch is possible)",
]
