id = "ARCH-EXPLICIT-TX-1"
title = "Services own the transaction lifecycle; repositories receive the handle as a parameter"
tag = "stack"
domain = "api-layer"
layer = "universal"
enforcement = "structured"
default = true
stance = "default"
summary = "When a unit of work spans multiple repository calls, the service layer opens the transaction, passes the transaction handle to each repository method as an explicit parameter, and commits or rolls back the transaction itself. Repositories never open or close transactions; they accept a handle and use it. Implicit or ambient transaction context (thread-local, request-scoped, AOP-injected, framework-magic) is forbidden, because the boundary then becomes invisible at the call site and unreliable under concurrency or async re-entry."
why = "Making the transaction handle an explicit parameter makes the unit-of-work boundary visible at every call site. A reviewer can see at a glance which calls are inside the transaction and which are outside, without having to reason about middleware order, annotation precedence, or whether the current execution context still holds the same handle as when it started. Implicit context is also a leading source of bugs in async or multithreaded code, where the execution context can move between threads or coroutines and the ambient transaction can become attached to the wrong unit of work."
alternatives = [
    "implicit or ambient transaction context held in thread-local or request-scoped state (works fine for the synchronous request-response shape; becomes a leading source of bugs in async, concurrent, or background-job code where the context can travel separately from the call stack)",
    "annotations or decorators that the framework injects transactions for, such as @Transactional in Java or similar magic elsewhere (the boundary is invisible at the call site; subtle bugs arise from annotation precedence, propagation modes, and self-invocation defeats)",
    "repositories open their own short transactions per call (no unit-of-work guarantee across related writes; partial failure leaves the database in an inconsistent state with no atomic rollback path)",
]
