id = "ARCH-HOT-READ-CACHE-1"
title = "Hot reads sit behind a TTL cache with explicit write-side invalidation"
tag = "stack"
domain = "api-layer"
layer = "universal"
enforcement = "structured"
default = false
stance = "default"
summary = "Read paths with high request volume and slowly-changing data sit behind a cache with a TTL. Writes that affect those reads explicitly invalidate the relevant cache keys. The TTL is the backstop for missed invalidations, not the primary mechanism. Apply to directory listings, profile lookups, RBAC and permission resolutions, and similar read-heavy endpoints. Do NOT apply to mutating paths, reads that are unsafe if stale (in-flight auth decisions, idempotency-key lookups), or paths where the caller expects to see their own just-completed change immediately."
why = "Cache hits are typically sub-millisecond while a database round trip is tens of milliseconds; the speedup is on the order of 20 to 50 times for the common path, free per request once warmed. Explicit invalidation on the write side keeps stale-read windows short, and the TTL catches the cases the invalidation logic misses: cross-service writes, missed code paths, schema-level changes, manual DB edits. TTL length is a per-service call against staleness tolerance; the rule commits to having a TTL, not to a specific value."
alternatives = [
    "no cache layer (every request pays the database round trip; works fine at low volume, accumulates latency cost as the system grows)",
    "cache with TTL only, no write-side invalidation (simpler to implement; longer windows of stale reads, and a request that just made a change cannot reflect it until the TTL expires)",
    "cache with invalidation only, no TTL (correct under explicit writes but unsafe when something changes outside the invalidation paths: backfill scripts, replication catch-up, manual DB edits, third-party data ingest)",
]
