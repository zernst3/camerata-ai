id = "ARCH-REPO-PER-AGGREGATE-1"
title = "One repository abstraction per aggregate, declared in the domain layer"
tag = "stack"
domain = "api-layer"
layer = "universal"
enforcement = "structured"
default = true
stance = "default"
summary = "Each domain aggregate has its own repository abstraction (an interface, trait, or protocol depending on the language) declared in the domain layer. The methods take and return domain types only. Concrete implementations live in the infrastructure layer and are wired in at the edges. Services depend on the abstraction, not the implementation."
why = "Per-aggregate abstractions let services depend on the shape of the data they actually need (a UserRepository exposes find_by_email, find_by_org; a ProjectRepository exposes find_by_owner) without inheriting persistence-specific methods they do not use. The domain layer stays free of any persistence concrete types, which is the load-bearing property of hexagonal architecture: persistence libraries can be upgraded, swapped, or supplemented without recompiling or rewriting the domain. Services become trivially mockable for unit tests because the abstraction is small and aggregate-specific."
alternatives = [
    "a single generic Repository<T> abstraction (does not fit aggregate-specific finder methods like find_by_slug, find_active_by_org; either degrades to find_by_id only or grows methods that some aggregates do not implement)",
    "one repository abstraction per use case rather than per aggregate (proliferates abstractions across the codebase; loses the aggregate cohesion and produces a large surface of one-method interfaces)",
    "no repository abstraction at all; services call the persistence library directly (couples every service to the chosen persistence library; the domain layer recompiles or breaks on every library upgrade)",
]
