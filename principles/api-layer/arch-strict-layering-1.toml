id = "ARCH-STRICT-LAYERING-1"
title = "Strict layering — services orchestrate, repositories own data access"
tag = "stack"
domain = "api-layer"
layer = "universal"
enforcement = "mechanical"
default = true
stance = "default"
summary = "Controllers handle HTTP only; services hold framework-agnostic business logic; repositories own all DB query calls. Enforce the boundary with lint (block direct DB access outside the data layer). Exception: transaction flow control belongs in services."
why = "Prevents business logic hiding inside the query layer; keeps each layer testable and swappable. Mixing layers and allowing DB access anywhere leaks business logic into the query layer, where it becomes harder to test in isolation and harder to surface during review, because reviewers naturally focus on the layer the change appears to belong to."
alternatives = [
    "controllers, services, and repositories are not separated by lint enforcement, and DB access can happen from any layer regardless of role",
]
