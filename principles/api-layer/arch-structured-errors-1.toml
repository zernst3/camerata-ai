id = "ARCH-STRUCTURED-ERRORS-1"
title = "Error responses use a structured envelope with stable machine-readable codes"
tag = "stack"
domain = "api-layer"
layer = "universal"
enforcement = "mechanical"
default = true
stance = "default"
summary = "Every 4xx and 5xx response uses the same shape: a top-level error object containing a code (a stable identifier like INVALID_EMAIL or RATE_LIMITED), a message (a human-readable description), and an optional details object for field-level errors or context. Codes are documented and remain stable across releases; messages may evolve freely. Clients pattern-match on code, never on message. Enforced at the controller layer with a single error-rendering middleware that all handlers route through."
why = "Stringly-typed error messages are a leading source of brittle client code because logic ends up doing substring matches on text that was meant for humans. Stable machine-readable codes let clients build reliable retry, fallback, and UX behavior without coupling to wording."
alternatives = [
    "plain string error messages (clients pattern-match on text; one copy edit silently breaks consumers)",
    "HTTP status codes only, no body envelope (4xx and 5xx do not carry enough resolution to distinguish between, say, three different validation failures within the same status)",
    "per-endpoint custom error shapes (clients write per-endpoint parsing; the surface area grows with every new endpoint)",
]
