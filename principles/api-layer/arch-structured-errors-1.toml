id = "ARCH-STRUCTURED-ERRORS-1"
title = "Error responses use a structured envelope with stable machine-readable codes"
tag = "stack"
domain = "api-layer"
layer = "universal"
enforcement = "mechanical"
default = true
stance = "default"
summary = "Every 4xx and 5xx response uses the same shape: a top-level error object containing a code (a stable identifier like INVALID_EMAIL or RATE_LIMITED), a message (a human-readable description), and an optional details object for field-level errors or context. Codes are documented and remain stable across releases; messages may evolve freely. Clients pattern-match on code, never on message. Enforced at the controller layer with a single error-rendering middleware that all handlers route through."
why = "Stringly-typed error messages are a leading source of brittle client code because logic ends up doing substring matches on text that was meant for humans. Stable machine-readable codes let clients build reliable retry, fallback, and UX behavior without coupling to wording. Returning plain string error messages forces clients to pattern-match on text; one copy edit silently breaks every consumer that pattern-matched the old wording. Returning HTTP status codes only without a body envelope does not carry enough resolution to distinguish between three different validation failures that share the same status, so clients cannot react appropriately. Per-endpoint custom error shapes force clients to write per-endpoint parsing, and the surface area grows with every new endpoint, instead of shrinking to a single shape across the API."
alternatives = [
    "error responses are plain strings (or contain only a free-form message field) and clients are expected to pattern-match on the human-readable wording",
    "error responses use only the HTTP status code with an empty body, and clients distinguish failure modes by status code alone",
    "each endpoint defines its own custom error response shape, and clients implement per-endpoint error parsing rather than a single shared parser",
]
