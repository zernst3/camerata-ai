id = "ARCH-UTC-TIMESTAMPS-1"
title = "Domain timestamps are anchored to UTC; mappers normalize at the persistence boundary"
tag = "stack"
domain = "api-layer"
layer = "universal"
enforcement = "structured"
default = true
stance = "default"
summary = "Timestamps in the domain layer use the language's UTC-anchored type, never an offset-bearing or naive type. The persistence boundary (the mapper between the storage representation and the domain type) is responsible for normalizing whatever the storage layer returns into UTC before the value reaches the domain. Locale and timezone presentation happen at the rendering boundary, never inside the domain."
why = "TIMESTAMPTZ and equivalent column types store UTC; the wire offset is session-determined noise. Letting offset-bearing or naive timestamps propagate past the persistence boundary means every downstream layer has to remember to handle the timezone question, and the answer drifts across the codebase. Normalizing once at the boundary gives the domain a single canonical clock and turns 'is this timestamp UTC?' from a runtime question into a type-level fact."
alternatives = [
    "let timestamps carry their fixed offset through the domain (propagates a representational detail past the boundary; every consumer becomes responsible for normalizing the same way)",
    "use naive (timezone-less) timestamps in the domain (loses the UTC fact entirely; produces silent off-by-hours bugs when the storage layer or a downstream consumer assumes a different timezone)",
    "store and pass timestamps as raw integers or strings (sheds the language's date-time API and adds a parsing or conversion bug surface at every layer that touches the value)",
]
