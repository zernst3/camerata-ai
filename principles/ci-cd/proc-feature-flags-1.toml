id = "PROC-FEATURE-FLAGS-1"
title = "Feature flags via env var or runtime config; no long-lived feature branches"
tag = "stack"
domain = "ci-cd"
layer = "universal"
enforcement = "structured"
default = false
stance = "default"
summary = "Incomplete features ship behind a per-environment gate (an env var, a config-service flag, or a runtime configuration entry) checked at runtime via a single helper. The code lives on the trunk but user-visible behavior stays off until the gate is configured to allow it. Long-lived feature branches are not used; work merges incrementally behind a gate instead. When the feature is shipped, the gate and its check are removed in a follow-up cleanup change rather than left behind as permanent infrastructure."
why = "Long-lived feature branches drift from main and the merge cost grows superlinearly with the branch's age. Flag-gating lets the work merge incrementally while keeping the feature dark in production until it is ready, which collapses the integration risk into many small reviews rather than one large one. A flag is also testable in production: it can be enabled for an internal user, a small percentage, or a canary environment without redeploying."
alternatives = [
    "long-lived feature branches (drift from main; merge cost grows with branch age; integration bugs all surface at once at merge time)",
    "flag-on-by-default with a kill switch (flips the failure mode: a regression is on for everyone until someone notices and trips the switch; defeats the safety property the flag is supposed to provide)",
    "ship the code conditionally based on environment without a gate (couples release shape to environment topology; staging and prod diverge in ways that are hard to test and hard to roll back)",
]
