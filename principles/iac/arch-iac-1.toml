id = "ARCH-IAC-1"
title = "Infrastructure as code, per-environment isolation"
tag = "stack"
domain = "iac"
layer = "universal"
enforcement = "prose"
default = true
stance = "default"
summary = "All infra scaffolding lives in IaC (e.g. Terraform); secrets live in a per-environment vault with isolation, never in the repo or CI logs; local dev stays credential-free via injection tooling."
why = "Reproducible environments, centralized rotation, no credential sprawl. Provisioning infrastructure manually through a cloud console and storing secrets in the repository or CI configuration produces silent drift between environments, sprawls credentials across artifacts the team cannot fully enumerate, and removes any centralized path for rotation; the next 'who has this key' question has no good answer."
alternatives = [
    "infrastructure is provisioned manually through a cloud console (click-ops) and secrets are stored in the repository or CI configuration rather than in a per-environment vault",
]
