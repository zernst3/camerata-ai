id = "ARCH-SERVER-AUTHZ-1"
title = "Authorization on the server; UI renders permission hints"
tag = "stack"
domain = "permissions"
layer = "universal"
enforcement = "mechanical"
default = true
stance = "default"
summary = "Each resource response carries server-computed permission flags (e.g. _can: { manage: true }); the UI gates affordances on those flags and never recomputes permission logic client-side. Block client-side permission introspection with lint."
why = "UI can't drift from server enforcement when both read the same server-computed truth; avoids leaking RBAC internals to the browser."
alternatives = [
    "client-side permission introspection (UI drifts from server; leaks RBAC internals)",
]
