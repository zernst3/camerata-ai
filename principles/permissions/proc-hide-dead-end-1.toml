id = "PROC-HIDE-DEAD-END-1"
title = "Hide dead-end affordances"
tag = "stack"
domain = "permissions"
layer = "universal"
enforcement = "structured"
default = true
stance = "default"
summary = "For permission-gated UIs: never render a UI action the user's permissions can't execute. Gate each affordance's render on the same permission its endpoint requires. A button that 403s drives the user to an error page; that redirect IS the bug."
why = "The logical extension of 'a missing permission is a config task': the code's job is to not offer what the user can't do."
alternatives = [
    "render all actions and let the endpoint reject (403 -> error-page redirect is itself the bug)",
]
