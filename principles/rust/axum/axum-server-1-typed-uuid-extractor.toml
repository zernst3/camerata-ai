id = "AXUM-SERVER-1"
title = "Validate UUID path params via the typed Axum extractor"
tag = "stack"
domain = "rust:axum"
layer = "framework"
enforcement = "structured"
default = true
stance = "default"
summary = "Type UUID path parameters as uuid::Uuid in the handler signature. Do not add a separate runtime UUID-string-validation tier."
why = "The type system already guarantees a parsable UUID before the handler body runs; layering a hand-rolled validator on top is dead weight."
alternatives = [
    "string path param plus a manual parse-and-validate step in the handler (redundant; the extractor already enforces it)",
]
