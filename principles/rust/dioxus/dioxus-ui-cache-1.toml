id = "DIOXUS-UI-CACHE-1"
title = "All UI fetches go through a query library"
tag = "stack"
domain = "rust:dioxus"
layer = "framework"
enforcement = "structured"
default = false
stance = "default"
summary = "Read paths in components go through a query library (e.g. dioxus-query); mutations explicitly invalidate the affected keys. No ad-hoc fetch-and-store on each call site."
why = "A free in-memory cache, request de-duplication, stale-while-revalidate behavior, refetch on focus, and a single point of invalidation, all from a library that already solved it."
alternatives = [
    "ad-hoc fetch-and-store at each call site (no de-dup, no cache, manual invalidation)",
]
