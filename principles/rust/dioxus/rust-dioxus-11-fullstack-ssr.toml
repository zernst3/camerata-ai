id = "RUST-DIOXUS-11"
title = "Single binary serves server-rendered HTML, the client bundle, and server-function endpoints"
tag = "stack"
domain = "rust:dioxus"
layer = "framework"
enforcement = "structured"
default = true
stance = "default"
summary = "The Dioxus project enables the framework's fullstack feature so that one server binary handles three concerns in one process. It renders the initial HTML on the server (so public content is indexable and first paint is fast). It serves the client bundle, which hydrates the server-rendered HTML on the client. And it mounts the server-function endpoints (per the server-function rule) and any remaining first-class HTTP endpoints (webhooks, health checks, authentication) on the same router. A separate frontend process running a different framework is forbidden. A client-only single-page application with no server-rendered initial paint is permitted only for fully-behind-login products where indexability has no value."
why = "Public-content pages need server-rendered HTML for indexability: search-engine rendering of JavaScript-only pages has improved over the years but server-rendered HTML remains the dominant signal, and the cost of being wrong is silent loss of organic traffic. The fullstack feature provides server-rendering, hydration, and the back-end in the same process the rest of the system already runs in, with no extra infrastructure. A client-only application loses indexability on every public route. A separate frontend process reintroduces inter-service latency and a second deploy unit, both of which the monolith shape was supposed to eliminate."
alternatives = [
    "client-only single-page application with no server-rendered initial paint (wins on architectural simplicity; loses indexability on every public route; defensible for behind-login products, wrong for products with public content)",
    "separate frontend process running a JavaScript framework (reintroduces dual-deploy and inter-service latency that the single-binary approach exists to delete; doubles the languages and runtimes the team has to maintain)",
    "render HTML on demand via a separate Rust binary distinct from the API binary (splits the runtime for no operational gain; doubles deploy units without a corresponding boundary benefit)",
]
