id = "RUST-DIOXUS-13"
title = "Forms display errors from the domain newtype constructors; the UI never re-implements validation rules"
tag = "stack"
domain = "rust:dioxus"
layer = "framework"
enforcement = "structured"
default = true
stance = "default"
summary = "Form fields bind to signals holding raw user text. On submit (or on blur for live-validation), the form constructs the relevant domain newtype through its fallible constructor and displays whatever validation error the constructor returns. The UI does NOT re-implement validation rules: no inline regex for email format, no max-length check duplicated in the component, no decimal parser repeated per form. The domain newtype is the rule; the UI's job is to call the constructor and render whatever the domain says is wrong. Multi-field forms compose a form-level type that exposes its own fallible constructor in turn."
why = "Duplicating validation rules between the domain layer and the UI is the largest single source of bugs of the shape 'the form let me submit but the backend rejected it.' The domain layer is the only correct place for validation rules; the UI presents them and never re-states them. The Rust newtype pattern makes this not just possible but ergonomic: the fallible constructor returns a typed error and the UI renders the error's display impl. The cost of getting this wrong compounds over time as more fields are added; the cost of doing it right is roughly the same as the wrong way at any single field."
alternatives = [
    "a declarative validation library used in the UI alongside domain newtypes (useful at a certain scale but adds a runtime validation layer that competes with the domain newtypes; the two can drift if both are sources of truth)",
    "duplicate the validation logic in the component (regex, length checks, format helpers); the exact failure mode this rule exists to prevent, since the duplicated rule and the domain rule will eventually diverge",
    "validate only on the server and leave the client unchecked (works correctness-wise but loses inline-error UX and produces a server round-trip per keystroke if used naively)",
]
