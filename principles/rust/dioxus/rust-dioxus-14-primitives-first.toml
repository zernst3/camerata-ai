id = "RUST-DIOXUS-14"
title = "Common UI elements have one canonical implementation in a primitives layer; views compose primitives"
tag = "stack"
domain = "rust:dioxus"
layer = "framework"
enforcement = "structured"
default = true
stance = "default"
summary = "The UI crate has two distinct kinds of components: primitives (Button, Modal, Toast, Card, Input, and similar reusable elements) and views (page-level components that compose primitives to express a feature). Every primitive has exactly one canonical implementation in a shared components directory. Views compose those primitives; views never reimplement a primitive inline or fork one for local convenience. Design-system decisions (color palette, corner radii, type system, focus rings, motion) live in the primitive component, so every view that composes the primitive inherits those decisions for free. A view that needs behavior a primitive does not yet expose extends the primitive's API rather than copying the primitive."
why = "Per-view reimplementation of common UI elements is the largest single source of visual drift in component-based UIs. Five views that each implement their own button slowly become five subtly different buttons, and design-system changes become a codebase-wide refactor instead of a single-file change. Centralizing primitives means design decisions have exactly one home, reviewers know where to look for design-system questions, and an AI agent porting or generating a view can compose primitives rather than reinvent them. Automated agents in particular fail at the second pattern: an agent given a feature view will inline a hand-rolled button rather than reach for an existing primitive unless the primitive is already there and the rule says to use it."
alternatives = [
    "feature-folder structure where each feature owns its own bespoke buttons, modals, and toasts (works for very large UIs with strong team ownership boundaries; produces visual drift across features and makes design-system changes a feature-by-feature edit)",
    "adopt a pre-existing third-party component library wholesale (loses the project's specific design vocabulary; constrains visual identity to whatever the library exposes)",
    "skip primitives entirely and inline utility classes in every view (works for a ten-page product; produces unreadable churn at any larger scale and makes design system changes a codebase-wide refactor)",
]
