id = "RUST-DIOXUS-2"
title = "Components are free functions returning Element; multi-prop components derive Props, Clone, and PartialEq"
tag = "stack"
domain = "rust:dioxus"
layer = "framework"
enforcement = "structured"
default = true
stance = "default"
summary = "Every component is a free function whose body returns Element, annotated with the component attribute. Single-prop or two-prop components may declare props inline as function arguments. Components with three or more props, or with any non-trivial prop, declare a dedicated props struct that derives the Props, Clone, and PartialEq traits. Struct-based components implementing a component trait, trait-object wrappers, and the legacy Scope-bearing signature from earlier framework versions are forbidden. Untyped value bags as props are forbidden."
why = "Functional components with derived Props are the canonical shape the framework actively maintains, and the only shape its tooling produces good error messages for. Deviations cost reviewer time (every contributor re-learns the project's bespoke shape) and break IDE refactor support. Clone and PartialEq on Props are required for diffing to work; diffing without PartialEq forces a re-render on every parent update, which compounds quickly into measurable jank."
alternatives = [
    "struct components implementing a Component trait (adds boilerplate, blocks the component-attribute macro, and produces worse error messages on misuse)",
    "props passed as untyped value bags (kills compile-time checking and defeats the entire reason to use a typed language for the UI)",
    "every component declares its props inline as function arguments regardless of count (fine for one or two props; past that the function signature becomes unreadable and the derive pattern is clearly cleaner)",
]
