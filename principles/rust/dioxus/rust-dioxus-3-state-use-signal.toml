id = "RUST-DIOXUS-3"
title = "Local component state is a Signal, read via call or read, written via set or with_mut"
tag = "stack"
domain = "rust:dioxus"
layer = "framework"
enforcement = "structured"
default = true
stance = "default"
summary = "Local component state uses the framework's signal primitive. Display interpolation reads the signal directly via call syntax or the read accessor. Replacing a value uses the set method; in-place mutation of a contained collection uses with_mut. Legacy state hooks from earlier framework versions are forbidden. Threading mutable state through props as a borrowed reference is forbidden. When state is shared across siblings, lift it to a common ancestor; when state is genuinely app-wide, use the cross-tree context pattern rather than passing signals through every layer."
why = "Signals are the framework's reactivity primitive: they automatically subscribe components that read them and integrate with template interpolation. Older state APIs are deprecated or removed and produce subtly different change-tracking behavior. Passing mutable references through props recreates a class-component anti-pattern from other ecosystems and breaks the framework's automatic re-render tracking, making the resulting bugs hard to attribute back to a specific call site."
alternatives = [
    "legacy hook-based state APIs from earlier framework versions (deprecated; the AI agent must not introduce them)",
    "a lock-protected value wrapped in a shared pointer inside props (works but loses automatic subscription tracking, so manual change notification becomes a per-component burden)",
    "manual force-rerender via a dummy signal (anti-pattern; signals exist to remove this exact code smell)",
]
