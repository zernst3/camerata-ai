id = "RUST-DIOXUS-4"
title = "Cross-tree state lives in named per-concern contexts, provided at or near the app root"
tag = "stack"
domain = "rust:dioxus"
layer = "framework"
enforcement = "structured"
default = true
stance = "default"
summary = "App-wide state (current user and session, modal stack, consent state, theme) is exposed through the framework's context system. Each concern gets its own context, named for what it is (AuthContext, ModalStackContext, ConsentContext). Providers are mounted at or near the app root. Contexts that own reactive state expose it as a signal so that consumers participate in subscription tracking. A single mega-context that holds every concern at once is forbidden because it forces every reader to re-render on every change, regardless of which concern actually moved."
why = "Threading state through props (prop drilling) kills review-ability after two or three layers of pass-through; contributors start violating the rule out of frustration as soon as the chain gets deep enough. The context system cleanly handles cross-tree state with framework-native subscription tracking. One context per concern keeps each render scope tight: a component that only reads auth does not re-render when a modal opens, and the two concerns can be tested and evolved independently."
alternatives = [
    "global statics held in a thread-safe wrapper (work across threads but bypass the framework's subscription system, requiring manual re-render plumbing at every read site)",
    "one super-context that holds every cross-tree concern in a single struct (every component reads it, every component re-renders on every change, render scope explodes)",
    "explicit prop drilling at every layer (fine for one or two layers of pass-through; past that, contributors and AI agents alike start violating the rule out of frustration)",
]
