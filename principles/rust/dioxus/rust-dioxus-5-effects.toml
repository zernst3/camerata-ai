id = "RUST-DIOXUS-5"
title = "Side effects run inside use_effect; dependencies auto-track from signal reads in the closure"
tag = "stack"
domain = "rust:dioxus"
layer = "framework"
enforcement = "structured"
default = true
stance = "default"
summary = "Side effects (telemetry emission, scroll-to-top on route change, manual DOM measurement, third-party widget initialization) run inside the framework's effect hook. Dependencies are tracked automatically from the signals the closure reads; there is no manual dependency array. Data fetching does NOT belong in an effect; use the resource hook for that. Cleanup runs through the drop implementation of state captured by the closure, the same way the framework cleans up any other state when a tracked signal changes."
why = "Auto-tracking from signal reads is more correct than the manual dependency arrays seen in other frameworks because a contributor cannot forget to list a dependency: the effect simply does not re-run if the value was not read. But the property only holds if the rule is followed: every piece of state the effect depends on must be a signal it reads inside the closure. Spawning async work for data fetching from an effect is the legacy fetch-from-effect pattern from other ecosystems; the resource hook exists precisely to remove that boilerplate and to centralize the loading and error lifecycle."
alternatives = [
    "manual dependency arrays passed to the effect hook (the framework tracks automatically; manual arrays are an anti-pattern the framework actively wants the code not to use)",
    "fetching data inside an effect rather than a resource hook (works mechanically but the resource hook handles loading and error and refresh ergonomically; per-component reimplementation of that plumbing leaks bugs)",
    "side effects placed in the component body outside any effect hook (runs on every render; produces double-fires and state desync)",
]
