id = "RUST-DIOXUS-7"
title = "Event handlers are move closures in templates; callback props use the framework EventHandler type"
tag = "stack"
domain = "rust:dioxus"
layer = "framework"
enforcement = "structured"
default = true
stance = "default"
summary = "Inline event handlers in the template are move closures, because the closure outlives the template expression and must own any state it captures. The framework's signal type is copyable, so capture is cheap. When a component exposes a callback as a prop, the prop is typed as the framework's EventHandler type parameterized by the value the callback delivers; the parent receives it as part of the props derive. The child invokes it through the call method. Bare function-trait closures, boxed function-trait objects, and bare function pointers in props are forbidden because they break the prop derives that the diffing pipeline depends on."
why = "Bare closure types in props break the equality derive that the framework uses for component diffing, because closures are not comparable. The result is one of two failures: either compilation breaks, or diffing degrades to always-re-render and the resulting performance regression hides under unrelated symptoms. The framework's EventHandler type is the designed-for-purpose abstraction; it composes with the props derive cleanly and produces the correct comparison semantics."
alternatives = [
    "a boxed function-trait object as the callback prop type (breaks the equality derive; component diffing degrades to always-re-render)",
    "an indirection through callback IDs registered in a central table (drastically more complex than the framework-native event handler type and loses type-safety on the call)",
    "synchronous function-pointer props (work only for stateless callbacks; do not compose with closures that capture signals or other state)",
]
