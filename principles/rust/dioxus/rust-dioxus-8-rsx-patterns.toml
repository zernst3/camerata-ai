id = "RUST-DIOXUS-8"
title = "Templates use native control flow; iterated children must carry a stable key"
tag = "stack"
domain = "rust:dioxus"
layer = "framework"
enforcement = "structured"
default = true
stance = "default"
summary = "Inside the framework's template macro, conditional rendering uses native if expressions, optional rendering uses native if-let expressions, iteration uses native for expressions, and multi-branch rendering uses native match expressions. Signal and string interpolation happens through curly-brace placeholders in attribute and text positions. Every child produced by a for expression carries a stable key derived from a property of the underlying data, never the loop index. Without a stable key, the framework cannot diff list reorders and every row remounts, destroying child state."
why = "Native Rust control flow inside the template means contributors do not have to learn a separate expression-mode dialect: the language they already know IS the template language. Stable keys on iterated children are the single most common subtle bug in component-tree UIs: visually the list renders correctly without them, but reorders silently rebuild every row's children, losing focus state, scroll position, and any in-progress input. The cost of catching this after launch is significantly higher than the cost of writing the key in the first place."
alternatives = [
    "build an iterator chain into a vector of elements and interpolate the vector (works mechanically but is harder to read than a direct for expression; reserve for cases that need iterator-style transformations the macro does not support inline)",
    "string-template rendering that bypasses the framework's diffing entirely (loses every benefit of the virtual DOM, including reactivity)",
    "omitting keys on lists that look stable in practice (works visually until the first reorder; child state vanishes silently and the cause is hard to trace after the fact)",
]
