id = "RUST-DIOXUS-9"
title = "Server-to-client calls use server functions, not a separately maintained HTTP client"
tag = "stack"
domain = "rust:dioxus"
layer = "framework"
enforcement = "structured"
default = true
stance = "default"
summary = "When the UI needs data or actions from the server, the framework's server-function macro is used to declare them. The macro generates the client-side call (over the wire, serialized) and the server-side handler from a single function definition. The function body runs server-side and may call the application's service layer directly. A separately maintained REST or RPC client crate that the UI imports is forbidden, because the same route surface would then have to be kept in sync across two boundaries. When the function legitimately needs to talk to a third party (payment provider, email gateway, external API), the call to that third party lives in the server-side body of a server function, never in client-side code."
why = "A hand-rolled client crate doubles the surface that has to stay in sync (the server-side route definition plus the client-side call) and reintroduces an opportunity for drift on every signature change. Server functions are the framework-native shape for the same intent: one source of truth per operation, one place to change when the operation evolves. They also play correctly with server-side rendering, where the same call resolves through an in-process function during the initial render and through the network during client-side hydration."
alternatives = [
    "a hand-rolled REST client crate the UI imports (duplicate route surface to maintain across the boundary; loses static type checks at the call site)",
    "a typed RPC layer added as a separate dependency (equivalent in shape to server functions but adds an extra dependency for what is already framework-native)",
    "a graph-query endpoint with code generation (premature complexity for the common case; works at scale but the project's data graph rarely warrants it from day one)",
]
