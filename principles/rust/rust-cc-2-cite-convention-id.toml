id = "RUST-CC-2"
title = "Cite the convention ID in commit messages"
tag = "stack"
domain = "rust"
layer = "language"
enforcement = "structured"
default = true
stance = "default"
summary = "A commit applying a rule cites its ID in the body (e.g. \"per ENTITIES-4\")."
why = "Makes drift detection and review fast: grep the ID to find related patterns and prior applications."
alternatives = [
    "no citation in commits (slow archaeology when a pattern needs to be traced)",
]
