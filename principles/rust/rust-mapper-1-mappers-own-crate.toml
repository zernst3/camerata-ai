id = "RUST-MAPPER-1"
title = "Mappers live in their own crate"
tag = "stack"
domain = "rust"
layer = "language"
enforcement = "structured"
default = true
stance = "default"
summary = "A dedicated mappers crate depends on both the domain crate and the persistence-entities crate; neither of those depends on the other."
why = "Enforces strict hexagonal layering: each side absorbs churn independently, and translation has one clear home. Putting mappers inside the entity crate couples entities to the domain shape, since the entity crate then has to know the domain types and breaks every time the domain evolves. Putting mappers inside the domain crate pulls persistence concerns into the domain, since the domain crate then has to know the entity shapes and gains a transitive dependency on the persistence layer, defeating the hexagonal commitment that domain has zero framework deps."
alternatives = [
    "the project's mappers live in the persistence-entities crate alongside the entity types, rather than in a dedicated mappers crate",
    "the project's mappers live in the domain crate alongside the domain types, rather than in a dedicated mappers crate",
]
