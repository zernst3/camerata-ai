id = "RUST-REPO-1"
title = "One trait per aggregate, declared in the domain crate"
tag = "stack"
domain = "rust"
layer = "language"
enforcement = "structured"
default = true
stance = "default"
summary = "Each aggregate has its own repository trait, defined in the domain crate; methods take and return domain types. Implementations live in the infrastructure crate."
why = "Services depend on the trait (so they are mockable), and the domain layer stays free of any persistence concrete types. This is the load-bearing hexagonal property."
alternatives = [
    "a single generic Repository<T> trait (does not fit aggregate-specific operations like find_by_slug)",
]
