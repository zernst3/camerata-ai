id = "RUST-REPO-2"
title = "Repositories return domain types, never persistence Models"
tag = "stack"
domain = "rust"
layer = "language"
enforcement = "structured"
default = true
stance = "default"
summary = "Repository methods take and return domain types only. Model-to-domain mapping happens inside the implementation via the mapper layer."
why = "Keeps the persistence representation an infrastructure detail; the domain layer does not recompile on persistence-library upgrades."
alternatives = [
    "expose persistence Models from repository methods (breaks the hexagonal boundary)",
]
