id = "RUST-REPO-3"
title = "Repository methods are async"
tag = "stack"
domain = "rust"
layer = "language"
enforcement = "structured"
default = true
stance = "default"
summary = "Repository trait methods are async; no sync wrappers."
why = "The persistence libraries are async-only; wrapping them in block_on is an anti-pattern in a layered async codebase. See also RUST-DOMAIN-5."
alternatives = [
    "sync wrapper methods that internally block_on (anti-pattern: friction and a perf loss)",
]
