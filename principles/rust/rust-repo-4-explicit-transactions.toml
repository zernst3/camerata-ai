id = "RUST-REPO-4"
title = "Transactions explicit, owned by services"
tag = "stack"
domain = "rust"
layer = "language"
enforcement = "structured"
default = true
stance = "default"
summary = "Repository methods take a &DatabaseTransaction parameter; the service opens, commits, and rolls back the transaction."
why = "Implicit task-local transaction context is a footgun in async code because tasks move between threads. Making the transaction handle a parameter is unambiguous."
alternatives = [
    "implicit transaction context held in task-local state (race-prone in async)",
]
