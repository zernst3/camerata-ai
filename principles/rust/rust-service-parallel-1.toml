id = "RUST-SERVICE-PARALLEL-1"
title = "Independent async calls MUST run concurrently"
tag = "stack"
domain = "rust"
layer = "language"
enforcement = "structured"
default = true
stance = "default"
summary = "Independent async calls run concurrently via tokio::try_join! or try_join_all; sequential .awaits on calls with no data dependency are a violation."
why = "Sequential awaits sum latencies (3×50ms = 150ms); concurrent awaits max them (3×50ms = 50ms). The penalty scales with the slowest call."
alternatives = [
    "sequential awaits even on independent calls (sums latencies needlessly)",
]
