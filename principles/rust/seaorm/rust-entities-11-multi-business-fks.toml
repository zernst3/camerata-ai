id = "RUST-ENTITIES-11"
title = "Two or more business FKs to the same parent: both belongs_to + role-named reverse has_many; one impl Related on the primary direction"
tag = "stack"
domain = "rust:seaorm"
layer = "library"
enforcement = "structured"
default = true
stance = "default"
summary = "When an entity has multiple business FKs to the same parent (e.g. requester_id, reviewer_id), declare both belongs_to plus disambiguated reverse has_many variants (…AsRequester, …AsReviewer). Add impl Related on the principal semantic direction (the creator or initiator); secondary directions use filtered queries. The pattern generalizes to N business FKs."
why = "Both directions get compile-time validation and self-document the roles. Uses the macro's one-impl-per-pair limit constructively. Keeping only one belongs_to and storing the other role as a plain column loses compile-time FK validation for the second role, which is exactly the protection the rule exists to give to both business FKs equally. Dropping the reverse has_many for one role works mechanically but business FKs are routinely traversed from both sides (a requester's open requests, a reviewer's pending reviews), so the missing direction becomes inline-join boilerplate at every reverse-traversal call site. Picking impl Related arbitrarily compiles fine but reads worse, because the principal semantic role makes the relation self-documenting and routing impl Related to the secondary role inverts that signal."
alternatives = [
    "the entity declares one of the business FKs as belongs_to and stores the other role as a plain Uuid column rather than as a foreign key with its own belongs_to and reverse has_many",
    "the entity declares both business FK belongs_to variants but drops the reverse has_many for one of the roles, so reverse traversal from the parent works for one role and not the other",
    "the entity declares both directions but routes impl Related to the secondary role rather than to the principal semantic direction, so find_related traverses the non-primary role by default",
]
