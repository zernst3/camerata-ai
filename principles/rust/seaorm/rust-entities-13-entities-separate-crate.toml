id = "RUST-ENTITIES-13"
title = "Entities live in their own crate, separate from infrastructure"
tag = "stack"
domain = "rust:seaorm"
layer = "library"
enforcement = "structured"
default = true
stance = "default"
summary = "The entities crate holds entity definitions only: no DB pool, no driver, no repository implementations. Canonical layout: domain ← mappers ← infrastructure ← app_services ← server, with entities ← mappers and domain ← everything."
why = "Without separation, the import graph cycles: infrastructure needs mappers, mappers need entities, and putting entities in infrastructure makes mappers depend on infrastructure, which cargo rejects. Placing entities inside the infrastructure crate and inlining or dropping mappers forms exactly that import cycle and violates the mapper layering the rule depends on. Moving repository implementations into the mapper crate is non-standard and conflates translation with adapter logic; the two have different lifecycles and different test surfaces, and the conflation makes both harder to evolve."
alternatives = [
    "the entities live in the infrastructure crate alongside the DB pool, driver, and repository implementations, with mappers inlined into infrastructure or dropped entirely",
    "repository implementations live in the mapper crate alongside the translation logic, rather than in the infrastructure crate",
]
