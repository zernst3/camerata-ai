id = "RUST-ENTITIES-4"
title = "FK relations declared on BOTH sides"
tag = "stack"
domain = "rust:seaorm"
layer = "library"
enforcement = "structured"
default = true
stance = "default"
summary = "Declare each foreign-key relation on both entities: belongs_to on the child plus has_one or has_many on the parent. Variant naming: belongs_to uses the parent singular; has_one uses the child singular; has_many uses the child plural."
why = "Compile-time validation of the full FK graph, plus find_related working in both directions. The result is self-documenting."
alternatives = [
    "one-sided declaration: only belongs_to on the child, no reverse on the parent (loses compile-time FK-graph validation in the reverse direction and disables find_related traversal from parent to child)",
    "rely on database-level FK enforcement only and skip the ORM relation declarations entirely (the DB still rejects bad writes, but find_related ergonomics are gone and every read that needs joined data has to be hand-built)",
    "declare relations only as needed for the current code (each new feature that wants the missing direction triggers a new annotation; the FK graph stays incomplete until every read shape is exercised in code)",
]
