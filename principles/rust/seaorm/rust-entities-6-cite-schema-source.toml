id = "RUST-ENTITIES-6"
title = "Module-level doc comment citing the schema source"
tag = "stack"
domain = "rust:seaorm"
layer = "library"
enforcement = "structured"
default = true
stance = "default"
summary = "Each entity file opens with a //! doc comment citing the source-of-truth schema location (e.g. the migration path or schema doc reference)."
why = "Makes drift detection a one-click trace: from the entity to the schema authority that defines it."
alternatives = [
    "no citation anywhere in the entity file (drift checks have to be reverse-engineered each time; reviewers cannot tell at a glance which migration or schema doc defines the columns they are reading)",
    "cite the source in a separate docs/ file or wiki page (the citation drifts from the entity over time; updates to one almost never propagate to the other, and the docs page eventually contradicts the code)",
    "rely on git history to trace the schema origin (works for shallow histories; breaks down after a few migrations and stops working entirely after squash merges, rebases, or migration consolidations)",
]
