id = "RUST-ENTITIES-7"
title = "Unique constraints the macro cannot express live at the DB level and are noted in the module doc"
tag = "stack"
domain = "rust:seaorm"
layer = "library"
enforcement = "structured"
default = true
stance = "default"
summary = "DeriveEntityModel can only express a single-column unconditional unique constraint via #[sea_orm(unique)]. Any uniqueness that does NOT match that shape (composite uniques across two or more columns, partial unique indexes with a WHERE clause, conditional uniques, deferrable uniques) is enforced exclusively in the migration and called out in the entity's module-level doc comment. Do not annotate a column #[sea_orm(unique)] in these cases just to communicate intent; the annotation falsely implies a stronger constraint than is actually present in the database."
why = "A single-column unique annotation tells every reader, and every consumer of the entity's derived metadata, that the column is independently unique. When the real constraint is composite or partial, that reader has been misled in a way that produces incorrect business logic (an existence check assumes uniqueness that the DB does not guarantee for that column alone). Putting the constraint where it is actually enforced (the migration) and naming it in the module doc keeps the entity honest about its own contract."
alternatives = [
    "annotate one column as unique to communicate intent (misleading: implies a single-column or unconditional uniqueness that the database does not enforce; downstream code reads the annotation as a contract)",
    "wait for a custom macro attribute that expresses composite or partial uniques (unsupported by the macro today; no roadmap signal)",
    "drop the uniqueness constraint at the DB level too and enforce in application code (the database loses the ability to reject duplicates atomically; race conditions across concurrent writers become a correctness bug)",
]
