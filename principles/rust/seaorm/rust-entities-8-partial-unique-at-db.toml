id = "RUST-ENTITIES-8"
title = "Partial unique indexes (WHERE clause) live at the DB level only"
tag = "stack"
domain = "rust:seaorm"
layer = "library"
enforcement = "structured"
default = true
stance = "default"
summary = "Do NOT mark a column #[sea_orm(unique)] when the actual constraint is a partial unique index. Enforce it in the migration and note it in the entity's module doc."
why = "An unconditional unique annotation implies global uniqueness; the macro cannot express the WHERE predicate that scopes the constraint."
alternatives = [
    "annotate as unique to communicate intent (misleading: implies unconditional uniqueness)",
    "wait for a custom attribute (unsupported by the macro today)",
]
