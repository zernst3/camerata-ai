id = "RUST-ENTITIES-2"
title = "No serde derives on the SeaORM Model (load-bearing)"
tag = "stack"
domain = "rust:seaorm"
layer = "library"
enforcement = "structured"
default = true
stance = "default"
summary = "Entity Models do not derive Serialize/Deserialize, which forces every API response through an explicit DTO plus mapper."
why = "The compiler then enforces the hexagonal boundary at compile time: code physically cannot JSON-encode a Model directly."
alternatives = [
    "serde on Models (lets code encode Models directly, breaking the boundary)",
    "per-entity opt-in (should be a per-endpoint DTO decision, not per-Model)",
]
