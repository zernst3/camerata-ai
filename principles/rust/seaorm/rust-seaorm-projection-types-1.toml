id = "RUST-SEAORM-PROJECTION-TYPES-1"
title = "Read methods returning a non-entity shape use a domain projection type"
tag = "stack"
domain = "rust:seaorm"
layer = "library"
enforcement = "structured"
default = true
stance = "default"
summary = "When a repository read method returns a shape that differs from the underlying entity, whether through joined fields from related entities, computed or aggregate columns, or a subset projection chosen for transfer-size reasons, it returns a typed projection struct that lives in the domain crate as a pure type. The domain projection does NOT derive the ORM result-mapping trait, because the domain crate carries no ORM or framework dependency and must stay WASM-clean (per the single-domain-crate rule). Instead, a private infrastructure-local row struct derives the result-mapping trait; the repository implementation selects only the columns the view needs through the framework's tuple-select builder, maps the result into that infra row, and converts it into the domain projection at the repository boundary, producing the projected shape in a single typed query. The projection is named for the view it represents, not for the entity it is derived from."
why = "Read views often need a shape the entity does not have: a thread joined with its author's display name, a wall row that combines several tables and a computed name, a feed entry that carries vote and comment counts as scalar subqueries. Returning the full entity through related-entity loading wastes memory on unused fields and still forces the caller to denormalize the related rows in application code. Returning untyped result rows forfeits compile-time validation of the column names the view depends on. A typed projection struct keeps the result shape document-able in the domain crate next to the repository it serves, picks up the same schema-drift detection that the result-mapping trait gives the raw-SQL escape hatch, and lets the typed query builder do the heavy lifting in a single round trip. Naming the projection for the view rather than for the entity keeps the structure pointed at what the caller actually renders. The result-mapping trait derive must NOT sit on the domain projection itself: the domain crate carries no ORM or framework dependency and must compile to WASM for a shared UI (the single-domain-crate purity rule), so a private infrastructure-local row struct owns the derive and maps into the pure domain projection at the repository boundary. This preserves typed, schema-drift-checked read views without leaking the ORM into the domain. (Amended 2026-06-08 after the conflict with the domain-crate-purity rule surfaced in a real build.)"
alternatives = [
    "Repository read methods return the full entity from a related-table find call even when only a subset of fields is needed, accepting the cost of materializing unused related rows on every read (trades memory and transfer overhead for a smaller trait surface; the calling layer reads the fields it cares about and ignores the rest)",
    "Repository read methods compose multiple typed queries at the service layer rather than declaring a projection type for joined or computed views; each repository stays one-table and each query is single-table (trades query count for trait-surface narrowness; assumes the round-trip cost of additional queries is acceptable relative to the cost of declaring projection types)",
    "Derive the ORM result-mapping trait directly on the domain projection struct (defensible only when the domain crate is not shared with a WASM UI and is allowed an ORM dependency; rejected for the single-domain-crate / WASM-clean stack, where it pulls the ORM into the domain and breaks the purity boundary)",
]
