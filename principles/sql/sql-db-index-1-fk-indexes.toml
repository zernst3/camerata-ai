id = "SQL-DB-INDEX-1"
title = "Every foreign-key column gets an index in the same migration"
tag = "stack"
domain = "sql"
layer = "universal"
enforcement = "mechanical"
default = true
stance = "default"
summary = "When a migration adds a foreign-key column, the same migration adds an index on it. Declare the index adjacent to the FK in the file so a reviewer can see them together. The pair is enforceable by a migration linter that scans for FK declarations and verifies a matching index in the same change."
why = "Most major databases (PostgreSQL, SQL Server, Oracle, SQLite) do not automatically index foreign-key columns; missing FK indexes are invisible at low data volume and devastating at high, and no cache layer above the database can compensate for an unindexed FK join. The rule is also worth applying on databases that do auto-index FKs (MySQL with InnoDB is the only major exception): the explicit declaration makes the intent reviewable, survives a future engine swap, and gives reviewers a stable rule ID to cite without having to first ask which engine is in use."
alternatives = [
    "rely on the database to auto-index foreign keys (works for MySQL with InnoDB only; silently brittle on PostgreSQL, SQL Server, Oracle, and SQLite)",
    "add FK indexes reactively after performance degrades (the slowdown surfaces in production; the fix is still a migration, just at a worse moment)",
    "declare FK indexes in a separate follow-up migration (creates a window where the FK exists without the index, and the second migration is easy to forget across context switches)",
]
