id = "SQL-DB-INDEX-2"
title = "Every WHERE-clause column has a supporting index"
tag = "stack"
domain = "sql"
layer = "universal"
enforcement = "mechanical"
default = true
stance = "default"
summary = "Columns used in WHERE predicates (and in ORDER BY/JOIN keys) have a supporting index. For composite filters, the most-selective column comes first in the index."
why = "After missing FK indexes, missing WHERE-column indexes are the second-most-common source of large query slowdowns at scale. Adding indexes reactively after queries get slow surfaces the slowdown in production, where it costs significantly more to triage and fix than the original migration would have cost to author correctly."
alternatives = [
    "indexes on WHERE-clause, ORDER BY, and JOIN-key columns are added reactively in later migrations after queries get slow, rather than alongside the schema that introduces the columns",
]
