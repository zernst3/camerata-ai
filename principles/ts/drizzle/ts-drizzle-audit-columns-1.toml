id = "TS-DRIZZLE-AUDIT-COLUMNS-1"
title = "Three audit-column strategies; pick by table semantics"
tag = "stack"
domain = "ts:drizzle"
layer = "library"
enforcement = "structured"
default = true
stance = "default"
summary = """Pick one of three audit-column strategies per table, by what produces the rows.

Admin-curated reference tables (categories, roles, system config): createdBy UUID + createdOn timestamp + modifiedBy UUID + modifiedOn timestamp. Multiple admins edit and modifiedBy is consumed.

User-generated content tables (posts, comments, applications): createdAt timestamp + updatedAt timestamp + an author FK column. The author FK already attributes; separate createdBy / modifiedBy would duplicate it.

System-managed event / log tables (audit_log, ingest_events): domain-specific timestamps (receivedAt, processedAt) and no createdBy / modifiedBy. The row's origin is the system, not a user."""
why = "A blanket createdBy / modifiedBy / createdAt / modifiedAt quartet on every table is wasteful (most user-generated rows never have a modifiedBy consumer) and misleading (event-log rows have no meaningful 'creator'). Tagging the strategy by what produces the rows keeps the schema honest about its own provenance."
alternatives = [
    "blanket all-four audit columns on every table (waste storage; mislead about who edited what for system-generated rows)",
    "skip audit columns entirely (loses the attribution that admin tables actually consume in workflows)",
]
