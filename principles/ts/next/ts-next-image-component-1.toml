id = "TS-NEXT-IMAGE-COMPONENT-1"
title = "Centralized image-delivery component; ban raw next/image"
tag = "stack"
domain = "ts:next"
layer = "framework"
enforcement = "mechanical"
default = true
stance = "default"
summary = "All images render through a single project-level image component that wires the CDN's variants (e.g. format=auto, no upscaling, responsive sizes) and your delivery defaults. Direct next/image and raw <img> imports in feature code are forbidden, enforced with a no-restricted-imports lint rule."
why = "Image delivery has policy decisions baked in (format negotiation, sizing, CDN variants, lazy-loading defaults) that should live in one place. Letting every call site reach for next/image directly spreads those decisions across the codebase and makes them impossible to evolve without touching every file."
alternatives = [
    "next/image everywhere (delivery policy is implicit and spread across the codebase; changing CDN strategy means touching every call site)",
    "raw <img> (loses lazy loading, responsive variants, and format negotiation that the framework already provides)",
]
