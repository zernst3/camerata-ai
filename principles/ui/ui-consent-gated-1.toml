id = "UI-CONSENT-GATED-1"
title = "No client-side storage or third-party trackers initialize without explicit consent"
tag = "stack"
domain = "ui"
layer = "universal"
enforcement = "structured"
default = true
stance = "default"
summary = "No client-side cookies, localStorage, sessionStorage, IndexedDB writes, or third-party analytics or tracking scripts initialize without a runtime consent check gated by the category the user agreed to. Necessary-category storage (auth session, preference for the consent banner itself) is the only exception, and is documented as such. New trackers require a Privacy Policy update and a consent-category update in the same change."
why = "GDPR and the ICO's equal-weight consent rules require opt-in for non-essential storage and tracking. A single tracker firing before consent is a compliance violation, not a UX paper cut. Forcing the consent check at the storage and initialization site, rather than at the page level, keeps the rule unambiguous, reviewable, and resistant to drift as components move across the codebase."
alternatives = [
    "initialize trackers globally and rely on opt-out (compliance violation under GDPR and ICO; the regulator does not accept 'we let users turn it off' as a substitute for opt-in)",
    "check consent at the page or route level (every page re-implements the check; trackers loaded in shared components, layouts, or third-party widgets silently bypass it)",
    "delay consent checks to a load-event handler (the tracker has already fetched its script and made its first beacon by the time the check runs; the violation has already happened)",
]
