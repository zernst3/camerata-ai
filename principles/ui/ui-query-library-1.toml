id = "UI-QUERY-LIBRARY-1"
title = "All UI data fetches go through a query library, never ad-hoc fetch and store"
tag = "stack"
domain = "ui"
layer = "universal"
enforcement = "structured"
default = false
stance = "default"
summary = "Read paths in components go through a query library (TanStack Query, SWR, dioxus-query, Vue Query, or equivalent for the framework). Mutations explicitly invalidate the cache keys they affect. Ad-hoc fetch-and-store inside each component (manual useState plus useEffect plus fetch) is forbidden. The query library owns request de-duplication, response caching, stale-while-revalidate behavior, refetch on focus or reconnect, and the single point of invalidation."
why = "Modern query libraries solve a list of problems that components otherwise re-solve inconsistently per call site: stale data, double-fired requests, no revalidation policy, manual invalidation after every mutation, no shared cache across components reading the same key. Adopting one is mostly a default-acceptance move; declining it means re-implementing the same machinery worse, in each consumer. The library is also where SSR or hydration behavior gets configured once, rather than at every call site."
alternatives = [
    "ad-hoc fetch and store at each call site (no de-dup; no shared cache between components reading the same data; manual invalidation everywhere; subtle bugs around effect dependencies and race conditions on remounts)",
    "global store with imperative loaders (works for slow-moving data but every component that reads must subscribe explicitly; invalidation and refetch policy bolt on awkwardly and are easy to get wrong)",
    "server-side rendering only, no client cache (acceptable for fully-static or fully-streamed UIs; falls over the moment a single interaction needs to re-read a value)",
]
