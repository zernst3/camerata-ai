id = "SPIRIT-FILE-SIZE-1"
title = "Files are sized for human reading, not for AI write-cost"
tag = "universal"
domain = "*"
layer = "universal"
enforcement = "prose"
default = true
stance = "default"
summary = "Hand-maintained files are split at sizes a human can navigate without losing their place. AI can generate and read a 2000-line file at no cost; every human who reviews, debugs, or maintains it pays full attention price. Auto-generated files (schema dumps, generated entity files, ORM-emitted models, lockfiles) are exempt: a tool maintains them, not a person."
why = "Pre-AI, splitting had a real writing cost (boilerplate, imports, naming) that made monolithic files a defensible tradeoff. AI removed that cost. The only remaining force keeping hand-written files small is human comprehension, so let it be the deciding axis. Generated artifacts are read tools-first, so the rule doesn't bind them."
alternatives = [
    "hand-maintained files are allowed to grow without a human-reading size guideline; size is whatever it ends up being (AI extends files happily; humans bog down on review and lose orientation as files grow)",
    "the human-reading size guideline applies to auto-generated files (schema dumps, ORM-emitted models, lockfiles) as well, forcing them split at the same threshold as hand-maintained files (forces useless splits in files no person hand-edits and that tooling rewrites wholesale anyway)",
]
