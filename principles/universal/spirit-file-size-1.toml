id = "SPIRIT-FILE-SIZE-1"
title = "Files are sized for human reading, not for AI write-cost"
tag = "universal"
domain = "*"
layer = "universal"
enforcement = "prose"
default = true
stance = "default"
summary = "Hand-maintained files are split at sizes a human can navigate without losing their place. AI can generate and read a 2000-line file at no cost; every human who reviews, debugs, or maintains it pays full attention price. Auto-generated files (schema dumps, generated entity files, ORM-emitted models, lockfiles) are exempt: a tool maintains them, not a person."
why = "Pre-AI, splitting had a real writing cost (boilerplate, imports, naming) that made monolithic files a defensible tradeoff. AI removed that cost. The only remaining force keeping hand-written files small is human comprehension, so let it be the deciding axis. Generated artifacts are read tools-first, so the rule doesn't bind them. Letting hand-maintained files grow without a human-reading size guideline fails the human-comprehension axis the rule exists to protect: AI happily extends files, but humans reviewing or debugging those files bog down and lose orientation as the files grow. Applying the same size guideline to auto-generated files fails in the opposite direction, because it forces useless splits in files no person hand-edits and that tooling rewrites wholesale anyway."
alternatives = [
    "hand-maintained files are allowed to grow without a human-reading size guideline, and their size is whatever they end up at",
    "the human-reading size guideline applies to auto-generated files (schema dumps, ORM-emitted models, lockfiles) at the same threshold as hand-maintained files",
]
