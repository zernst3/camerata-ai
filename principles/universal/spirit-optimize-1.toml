id = "SPIRIT-OPTIMIZE-1"
title = "Optimization by default"
tag = "universal"
domain = "*"
layer = "universal"
enforcement = "prose"
default = true
stance = "default"
summary = "Bake performant patterns (parallel async, caching, indexing, no N+1) into conventions from day one, as the default shape of new code, not a reactive fix after profiling."
why = "When AI carries the cost of writing the performant version, the Knuth-era 'premature optimization' calculus flips: the optimization is now nearly free and prevents the firefighting that reactive perf work costs later (5x+)."
alternatives = [
    "reactive optimization after problems surface (the known-expensive negative case)",
]
